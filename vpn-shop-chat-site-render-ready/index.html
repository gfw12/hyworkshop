<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HY 数字服务商城 | 商品展示</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">HY SERVICE</p>
      <h1>HY 数字服务商城</h1>
      <p class="sub">在线选择套餐、提交订单、扫码付款，客服会在付款后协助开通和配置。</p>
    </div>
    <nav>
      <a href="./index.html">套餐</a>
      <button type="button" id="viewOrdersButton" class="nav-button">查看订单</button>
      <a href="./admin.html">后台管理</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div>
        <p class="eyebrow" id="heroEyebrowText">HY SERVICE</p>
        <h2 id="heroTitleText">加速套餐、付款下单和客服确认都在一个页面完成。</h2>
        <p id="heroBodyText">选择合适套餐后提交订单，付款完成请联系右下角客服确认开通。</p>
      </div>
      <div class="hero-card">
        <span id="heroCountLabelText">可选套餐</span>
        <strong id="productCount">0</strong>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="搜索套餐名称、分类或描述" />
      <select id="categoryFilter">
        <option value="">全部分类</option>
      </select>
    </section>

    <section id="productGrid" class="product-grid"></section>
  </main>

  <dialog id="checkoutDialog" class="checkout-dialog">
    <form id="checkoutForm" method="dialog" class="checkout-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">CHECKOUT</p>
          <h2 id="checkoutTitle">提交订单</h2>
        </div>
        <button type="button" class="icon-button" id="closeCheckout">×</button>
      </div>

      <div class="order-summary" id="orderSummary"></div>
      <div class="payment-options" id="paymentOptions"></div>
      <div id="checkoutFields" class="checkout-fields"></div>
      <div class="payment-tip" id="paymentTip"></div>

      <div class="form-actions">
        <button type="submit">提交订单</button>
        <button type="button" class="ghost" id="cancelCheckout">取消</button>
      </div>
    </form>
  </dialog>

  <dialog id="paymentDialog" class="checkout-dialog">
    <div class="checkout-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">PAYMENT</p>
          <h2 id="paymentDialogTitle">扫码付款</h2>
        </div>
        <button type="button" class="icon-button" id="closePaymentDialog">×</button>
      </div>
      <div class="qr-box" id="paymentQrBox">
        <img id="paymentQrImage" alt="收款码" />
        <span id="paymentQrEmpty">请先在后台填写收款码图片地址</span>
      </div>
      <div class="payment-checking" id="paymentChecking">付款后请联系客服确认</div>
      <button type="button" id="contactAfterPay">联系客服确认</button>
    </div>
  </dialog>

  <dialog id="contactDialog" class="checkout-dialog">
    <div class="checkout-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">SERVICE</p>
          <h2>联系客服</h2>
        </div>
        <button type="button" class="icon-button" id="closeContactDialog">×</button>
      </div>
      <div class="contact-notice">请加客服QQ3792478296或者群6086643888进行充值</div>
      <button type="button" id="contactDone">知道了</button>
    </div>
  </dialog>

  <dialog id="customerOrdersDialog" class="checkout-dialog orders-dialog">
    <div class="checkout-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">ORDERS</p>
          <h2>我的订单</h2>
        </div>
        <button type="button" class="icon-button" id="closeCustomerOrders">×</button>
      </div>
      <div id="customerOrdersList" class="customer-orders-list"></div>
      <button type="button" id="customerOrdersDone">关闭</button>
    </div>
  </dialog>

  <aside class="chat-widget" id="chatWidget">
    <button class="chat-toggle" id="chatToggle">咨询客服</button>
    <div class="chat-panel" id="chatPanel">
      <div class="chat-head">
        <div>
          <strong>在线咨询</strong>
          <span>通常几分钟内回复</span>
        </div>
        <button id="closeChat">×</button>
      </div>
      <div class="chat-body" id="chatBody"></div>
      <form class="chat-form" id="chatForm">
        <input id="customerName" placeholder="姓名/称呼" />
        <input id="chatText" placeholder="输入想咨询的问题" required />
        <button type="submit">发送</button>
      </form>
    </div>
  </aside>

  <script src="./app.js"></script>
</body>
</html>
